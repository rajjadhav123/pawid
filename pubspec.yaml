name: pawid
description: AI-powered dog breed detection app for Indian pet owners.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.0

  # Image handling
  image_picker: ^1.0.7

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # UI
  google_fonts: ^6.1.0
  fl_chart: ^0.68.0
  shimmer: ^3.0.0

  # Utilities
  path_provider: ^2.1.2
  share_plus: ^7.2.2
  permission_handler: ^11.3.0
  intl: ^0.19.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/